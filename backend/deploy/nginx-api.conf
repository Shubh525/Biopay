# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for BioPay Backend API (Bootstrap HTTP config)
# Domain:  api.connectbiopay.com
# Place at: /etc/nginx/sites-available/biopay-api
# Enable:   sudo ln -s /etc/nginx/sites-available/biopay-api /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx
#
# NOTE: This config starts as HTTP-only so Nginx can boot. Certbot will
# automatically add SSL listen blocks, certificates, and redirects when run.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name api.connectbiopay.com;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    # ── Client body size (for biometric template uploads) ────────────────────
    client_max_body_size 10M;

    # ── Request timeouts ─────────────────────────────────────────────────────
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Flask REST API (/api/*) ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CORS preflight handled by Flask-CORS — allow it through
        proxy_pass_header  Access-Control-Allow-Origin;
    }

    # ── Socket.IO WebSocket (eventlet backend) ────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Longer timeout for persistent socket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Deny access to .env and hidden files ─────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/biopay-api.access.log;
    error_log  /var/log/nginx/biopay-api.error.log warn;
}

