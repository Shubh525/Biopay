name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  lint:
    name: Lint & Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          cd backend
          flake8 . \
            --max-line-length=120 \
            --exclude=venv,.venv,__pycache__,migrations \
            --ignore=E501,W503

      - name: Check for secrets accidentally committed
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '^backend/\.env$'; then
            echo "❌ ERROR: .env file was committed! Remove it immediately."
            exit 1
          fi
          echo "✅ No .env files committed."
