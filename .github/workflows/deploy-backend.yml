name: Deploy Backend to EC2

# ── Manual trigger ONLY ──────────────────────────────────────────────────────
# Click "Run workflow" in GitHub Actions → Actions tab → Deploy Backend to EC2
on:
  workflow_dispatch:

jobs:
  # ── Run lint before deploying ──────────────────────────────────────────────
  lint:
    name: Pre-deploy Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          cd backend
          flake8 . \
            --max-line-length=120 \
            --exclude=venv,.venv,__pycache__,migrations \
            --ignore=E501,W503

  # ── Deploy to EC2 ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint

    environment:
      name: production
      url: https://api.connectbiopay.com/api/health

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -e

            echo "══════════════════════════════════════════"
            echo "  BioPay Backend — Starting Deployment"
            echo "  Triggered by: ${{ github.actor }}"
            echo "══════════════════════════════════════════"

            # ── Pull latest code ──────────────────────────────────────────
            echo "▶ Pulling latest code..."
            cd /var/www/biopay
            git fetch origin main
            git reset --hard origin/main

            # ── Install / update Python dependencies ─────────────────────
            echo "▶ Installing dependencies..."
            cd /var/www/biopay/backend
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -r requirements.txt -q

            # ── Restart backend service ───────────────────────────────────
            echo "▶ Restarting backend service..."
            sudo systemctl restart biopay-backend

            # ── Health check (wait for service to come up) ────────────────
            echo "▶ Health check..."
            sleep 4
            for i in 1 2 3; do
              if curl -sf --max-time 10 http://127.0.0.1:5000/api/health; then
                echo ""
                echo "✅ Deployment successful! Backend is healthy."
                exit 0
              fi
              echo "  Attempt $i failed, retrying in 3s..."
              sleep 3
            done

            echo "❌ Health check failed after 3 attempts."
            echo "   Logs:"
            sudo journalctl -u biopay-backend -n 30 --no-pager
            exit 1

      - name: Notify on success
        if: success()
        run: |
          echo "🚀 Deployment to api.connectbiopay.com succeeded!"
          echo "   Actor:  ${{ github.actor }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED"
          echo "   Check the logs above and on EC2:"
          echo "   sudo journalctl -u biopay-backend -n 50"
