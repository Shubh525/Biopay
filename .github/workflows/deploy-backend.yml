name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  # ── Job 1: Lint & basic checks ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          cd backend
          flake8 . \
            --max-line-length=120 \
            --exclude=venv,.venv,__pycache__,migrations \
            --ignore=E501,W503

      - name: Check for secrets accidentally committed
        run: |
          # Fail if any .env file (not .env.example) was committed
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '^backend/\.env$'; then
            echo "❌ ERROR: .env file was committed! Remove it immediately."
            exit 1
          fi
          echo "✅ No .env files committed."

  # ── Job 2: Deploy to EC2 (only on main branch) ────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: production
      url: https://api.connectbiopay.com/api/health

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -e

            echo "══════════════════════════════════════════"
            echo "  BioPay Backend — Starting Deployment"
            echo "  Commit: ${{ github.sha }}"
            echo "  Triggered by: ${{ github.actor }}"
            echo "══════════════════════════════════════════"

            # ── Pull latest code ──────────────────────────────────────────
            echo "▶ Pulling latest code..."
            cd /var/www/biopay
            git fetch origin main
            git reset --hard origin/main

            # ── Install / update Python dependencies ─────────────────────
            echo "▶ Installing dependencies..."
            cd /var/www/biopay/backend
            source venv/bin/activate
            pip install --upgrade pip -q
            pip install -r requirements.txt -q

            # ── Restart backend service ───────────────────────────────────
            echo "▶ Restarting backend service..."
            sudo systemctl restart biopay-backend

            # ── Health check (wait for service to come up) ────────────────
            echo "▶ Health check..."
            sleep 4
            for i in 1 2 3; do
              if curl -sf --max-time 10 http://127.0.0.1:5000/api/health; then
                echo ""
                echo "✅ Deployment successful! Backend is healthy."
                exit 0
              fi
              echo "  Attempt $i failed, retrying in 3s..."
              sleep 3
            done

            echo "❌ Health check failed after 3 attempts."
            echo "   Logs:"
            sudo journalctl -u biopay-backend -n 30 --no-pager
            exit 1

      - name: Notify on success
        if: success()
        run: |
          echo "🚀 Deployment to api.connectbiopay.com succeeded!"
          echo "   Commit: ${{ github.sha }}"
          echo "   Actor:  ${{ github.actor }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED for commit ${{ github.sha }}"
          echo "   Check the logs above and on EC2:"
          echo "   sudo journalctl -u biopay-backend -n 50"
